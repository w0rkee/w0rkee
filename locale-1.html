<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bar Le Terrazze | wOrkee Palermo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            color: #333; 
            background: #f9f9f9; 
            scroll-behavior: smooth;
        }

        /* TESTATA */
        .header-locale { 
            height: 40vh; 
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('img/locale1.jpg') center/cover; 
            background-attachment: fixed;
        }

        /* SCHEDA CONTENITORE */
        .container { 
            max-width: 900px; 
            margin: -80px auto 60px; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 50px rgba(0,0,0,0.1); 
            position: relative; 
            z-index: 2;
        }

        .back-link { 
            display: inline-flex; 
            align-items: center;
            margin-bottom: 25px; 
            color: #006B6B; 
            text-decoration: none; 
            font-weight: 700; 
            font-size: 0.85rem;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .back-link:hover { transform: translateX(-5px); color: #333; }

        .info-tag { 
            display: inline-block; 
            background: #e0f2f2; 
            color: #006B6B; 
            padding: 6px 15px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 700; 
            margin-bottom: 15px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 { 
            color: #006B6B; 
            text-transform: uppercase; 
            margin: 0 0 20px 0; 
            font-size: 2.5rem;
            letter-spacing: -1px;
        }

        p { line-height: 1.8; color: #666; font-size: 1.05rem; }

        /* SERVIZI */
        .services-grid {
            margin: 40px 0; 
            padding: 30px;
            background: #fdfdfd;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .services-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .services-list li {
            font-size: 0.95rem;
            display: flex;
            align-items: center;
        }
